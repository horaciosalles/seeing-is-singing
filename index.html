<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SightSing</title>
<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:    #F3EEE5;
  --paper:    #FDFAF4;
  --ink:      #111111;
  --ink2:     #3D3830;
  --rule:     #C4BAA8;
  --muted:    #9A9080;
  --accent:   #8B2020;
  --green:    #1A6638;
  --amber:    #9B6800;
  --uiBg:     #EAE4D7;
  --uiBorder: #CCC3B2;
}

html, body {
  height: 100%;
  overflow-x: hidden;
  overflow-y: auto;
}

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Libre Baskerville', serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

/* ── HEADER ── */
.hdr {
  width: 100%;
  background: var(--paper);
  border-bottom: 1px solid var(--uiBorder);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 20px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
}
.logo {
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: .02em;
  user-select: none;
}
.logo em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.hdr-controls {
  display: flex;
  align-items: center;
  gap: 14px;
}
.ctrl {
  display: flex;
  align-items: center;
  gap: 5px;
}
.clbl {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .52rem;
  color: var(--muted);
  letter-spacing: .07em;
  text-transform: uppercase;
}
select {
  font-family: 'Libre Baskerville', serif;
  font-size: .78rem;
  background: var(--paper);
  border: 1px solid var(--uiBorder);
  color: var(--ink);
  padding: 4px 6px;
  border-radius: 2px;
  cursor: pointer;
}
input[type=range] {
  width: 58px;
  accent-color: var(--accent);
  cursor: pointer;
}
.num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .68rem;
  color: var(--ink2);
  min-width: 22px;
}

/* ── MAIN ── */
.main {
  width: 100%;
  max-width: 620px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 14px 24px;
  gap: 12px;
  flex: 1;
}

/* ── DRILL CHIPS ── */
.drill-row {
  width: 100%;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}
.chip {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .56rem;
  letter-spacing: .02em;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--uiBorder);
  background: var(--paper);
  color: var(--muted);
  cursor: pointer;
  transition: all .12s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}
.chip:hover { border-color: var(--ink2); color: var(--ink); }
.chip.sel   { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* ── STAFF CARD ── */
.staff-card {
  width: 100%;
  background: var(--paper);
  border: 1px solid var(--uiBorder);
  border-radius: 3px;
  padding: 18px 14px 14px;
  box-shadow: 0 2px 16px rgba(0,0,0,.06);
  flex-shrink: 0;
  position: relative;
}
#mainCanvas {
  display: block;
  width: 100%;
}

/* ── PITCH READOUT ── */
.pitch-row {
  width: 100%;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 0 4px;
  min-height: 32px;
}
.pr-note {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--ink);
  min-width: 36px;
  transition: color .08s;
  line-height: 1;
}
.pr-note.on    { color: var(--green); }
.pr-note.amber { color: var(--amber); }
.pr-note.off   { color: var(--accent); }

.pr-cents {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .75rem;
  color: var(--muted);
  min-width: 44px;
  text-align: center;
}
.pr-hz {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .62rem;
  color: var(--rule);
  text-align: right;
  min-width: 64px;
}

/* ── STATUS ── */
.status-msg {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .6rem;
  color: var(--muted);
  letter-spacing: .04em;
  text-align: center;
  min-height: 16px;
}

/* ── BUTTONS ── */
.btn-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.btn-main {
  width: 100%;
  font-family: 'Libre Baskerville', serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: .04em;
  padding: 16px 0;
  border-radius: 3px;
  border: none;
  cursor: pointer;
  transition: background .12s, transform .07s, opacity .12s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}
.btn-main:active { transform: scale(.98); }
.btn-main.start {
  background: var(--ink);
  color: var(--paper);
}
.btn-main.start:hover { background: var(--ink2); }
.btn-main.start:disabled { opacity: .25; cursor: default; pointer-events: none; }

.btn-row {
  width: 100%;
  display: flex;
  gap: 10px;
}
.btn-half {
  flex: 1;
  font-family: 'Libre Baskerville', serif;
  font-size: .9rem;
  font-weight: 700;
  padding: 14px 0;
  border-radius: 3px;
  cursor: pointer;
  transition: background .12s, color .12s, transform .07s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  user-select: none;
}
.btn-half:active { transform: scale(.97); }
.btn-retry {
  background: var(--ink);
  color: var(--paper);
  border: none;
}
.btn-retry:hover { background: var(--ink2); }
.btn-new {
  background: transparent;
  color: var(--ink2);
  border: 1.5px solid var(--uiBorder);
  font-weight: 400;
  font-style: italic;
}
.btn-new:hover { border-color: var(--ink2); color: var(--ink); }

.btn-stop {
  background: transparent;
  color: var(--muted);
  border: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: .62rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 8px 0;
  cursor: pointer;
  width: 100%;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn-stop:hover { color: var(--accent); }

.hidden { display: none !important; }

/* ── OVERLAY ── */
.ov {
  position: fixed; inset: 0; z-index: 99;
  background: rgba(243,238,229,.96);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  padding: 40px;
  text-align: center;
}
.ov.gone { display: none; }
.ov-title { font-size: 2.2rem; font-weight: 700; }
.ov-title em { font-style: italic; font-weight: 400; color: var(--accent); }
.ov-body {
  font-size: .92rem;
  color: var(--muted);
  line-height: 1.85;
  max-width: 300px;
}
.ov-steps {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .62rem;
  color: var(--ink2);
  line-height: 2.2;
  text-align: left;
  background: var(--uiBg);
  padding: 14px 20px;
  border-radius: 2px;
  border: 1px solid var(--uiBorder);
  max-width: 300px;
  width: 100%;
}
.ov-btn {
  font-family: 'Libre Baskerville', serif;
  font-size: .92rem;
  font-weight: 700;
  padding: 14px 0;
  border-radius: 3px;
  border: none;
  background: var(--ink);
  color: var(--paper);
  cursor: pointer;
  width: 100%;
  max-width: 300px;
  touch-action: manipulation;
  transition: background .12s;
}
.ov-btn:hover { background: var(--ink2); }
.ov-err {
  font-family: 'IBM Plex Mono', monospace;
  font-size: .62rem;
  color: var(--accent);
  display: none;
  max-width: 300px;
}
</style>
</head>
<body>

<div class="ov" id="ov">
  <div class="ov-title">Sight<em>Sing</em></div>
  <div class="ov-body">Sight-singing drills with real-time pitch feedback.</div>
  <div class="ov-steps">
    1 · Allow microphone access<br>
    2 · Pick a drill and key<br>
    3 · Press Start — listen to the chord<br>
    4 · Sing when the metronome enters beat 1<br>
    5 · Watch the red line — land on each note
  </div>
  <button class="ov-btn" id="grantBtn">Allow microphone</button>
  <div class="ov-err" id="ovErr"></div>
</div>

<div class="hdr">
  <span class="logo">Sight<em>Sing</em></span>
  <div class="hdr-controls">
    <div class="ctrl">
      <span class="clbl">Key</span>
      <select id="keyS">
        <option value="C">C</option>
        <option value="G">G</option>
        <option value="F">F</option>
        <option value="D">D</option>
        <option value="Bb">B♭</option>
        <option value="A">A</option>
      </select>
    </div>
    <div class="ctrl">
      <span class="clbl">♩=</span>
      <input type="range" id="bpmR" min="40" max="120" value="72">
      <span class="num" id="bpmV">72</span>
    </div>
  </div>
</div>

<div class="main">

  <div class="drill-row" id="drillRow"></div>

  <div class="staff-card">
    <canvas id="mainCanvas" height="230"></canvas>
  </div>

  <div class="pitch-row">
    <span class="pr-note" id="prNote">—</span>
    <span class="pr-cents" id="prCents"></span>
    <span class="pr-hz" id="prHz"></span>
  </div>

  <div class="status-msg" id="statusMsg">Press Start to begin</div>

  <div class="btn-area">
    <!-- READY state -->
    <button class="btn-main start" id="btnStart">Start</button>

    <!-- SINGING state (escape only) -->
    <button class="btn-stop hidden" id="btnStop">■ stop</button>

    <!-- REVIEW state -->
    <div class="btn-row hidden" id="reviewBtns">
      <button class="btn-half btn-retry" id="btnRetry">Try Again</button>
      <button class="btn-half btn-new"   id="btnNew">New Drill</button>
    </div>
  </div>

</div>

<script>
'use strict';

// ── VexFlow ───────────────────────────────────────────────────────────────────
const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental } = Vex.Flow;

// ── THEORY ────────────────────────────────────────────────────────────────────
const NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const hz2midi   = hz => 69 + 12 * Math.log2(hz / 440);
const midi2hz   = m  => 440 * Math.pow(2, (m - 69) / 12);
const mpc       = m  => ((m % 12) + 12) % 12;
const moct      = m  => Math.floor(m / 12) - 1;

const KEY_ROOT = { C:60, G:67, D:62, A:69, F:65, Bb:70 };
const VF_KEY   = { C:'C', G:'G', D:'D', A:'A', F:'F', Bb:'Bb' };
const KEY_PCS  = { C:[], G:[6], D:[6,1], A:[6,1,8], F:[10], Bb:[10,3] };

function needsAcc(midi, key) {
  const p = mpc(midi);
  if (![1,3,6,8,10].includes(p)) return null;
  if (KEY_PCS[key].includes(p))  return null;
  return [1,3,8].includes(p) ? '#' : 'b';
}

function midiToVFKey(midi) {
  const n = ['c','c','d','d','e','f','f','g','g','a','a','b'];
  const a = ['','#','','#','','','#','','#','','#',''];
  return `${n[mpc(midi)]}${a[mpc(midi)]}/${moct(midi)}`;
}

// Drills — 4 quarter notes, one 4/4 measure
const DRILLS = [
  { name:'Steps ↑',   off:[0,2,4,5]    },
  { name:'Steps ↓',   off:[12,11,9,7]  },
  { name:'Triad ↑',   off:[0,4,7,12]   },
  { name:'Triad ↓',   off:[12,7,4,0]   },
  { name:'Arch',      off:[0,4,7,4]    },
  { name:'Thirds',    off:[0,4,2,5]    },
  { name:'Leap ↑',    off:[0,7,9,12]   },
  { name:'Leap ↓',    off:[12,5,3,0]   },
];

let curDrill = 0;
let curKey   = 'C';
let bpm      = 72;
let beatSec  = 60 / 72;

function getPhrase() {
  const root = KEY_ROOT[curKey];
  return DRILLS[curDrill].off.map(o => root + o);
}

// ── STATE MACHINE ─────────────────────────────────────────────────────────────
// States: READY | INTRO | SING | REVIEW
let STATE = 'READY';

function setState(s) {
  STATE = s;
  const btnStart   = document.getElementById('btnStart');
  const btnStop    = document.getElementById('btnStop');
  const reviewBtns = document.getElementById('reviewBtns');

  btnStart.classList.toggle('hidden',   s !== 'READY');
  btnStop.classList.toggle('hidden',    s !== 'SING');
  reviewBtns.classList.toggle('hidden', s !== 'REVIEW');

  const msgs = {
    READY:  'Press Start to begin',
    INTRO:  'Listen — find your pitch',
    SING:   'Sing',
    REVIEW: 'Review your pitch — Try Again or New Drill',
  };
  setStatus(msgs[s] || '');

  if (s !== 'SING') clearPitchDisplay();
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let actx     = null;
let analyser = null;

// Metronome click — 4/4 accent on beat 1
function click(t, beat) {
  const accent = (beat % 4 === 0);
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.connect(g); g.connect(actx.destination);
  o.frequency.value = accent ? 1100 : 680;
  const vol = accent ? 0.20 : 0.07;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.055);
  o.start(t); o.stop(t + 0.065);
}

// Piano-like tone (additive harmonics, attack + decay)
function pianoTone(hz, t, dur, vol) {
  [1, 2, 3, 4, 6].forEach((h, i) => {
    const hv = [1, .38, .16, .07, .03][i];
    const o  = actx.createOscillator();
    const g  = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.type = 'sine';
    o.frequency.value = hz * h;
    const v = vol * hv;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(v, t + 0.012);
    g.gain.exponentialRampToValueAtTime(v * 0.28, t + 0.35);
    g.gain.exponentialRampToValueAtTime(v * 0.10, t + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.0001,   t + dur);
    o.start(t); o.stop(t + dur + 0.04);
  });
}

// ── SCHEDULER ─────────────────────────────────────────────────────────────────
const LOOKAHEAD = 0.12;
const SCHED_MS  = 25;
let schedTimer    = null;
let nextBeatAudio = 0;
let schedBeatIdx  = 0;

// Total beats: 4 intro + 4 phrase = 8
// beatAudioTimes[i] = actx time when phrase beat i fires
let beatAudioTimes = [];
let vBeatQueue     = [];  // {t, kind:'intro'|'phrase', pi?}

function startScheduler() {
  schedBeatIdx   = 0;
  beatAudioTimes = [];
  vBeatQueue     = [];
  nextBeatAudio  = actx.currentTime + 0.15;
  schedTimer = setInterval(schedTick, SCHED_MS);
  schedTick();
}

function stopScheduler() {
  if (schedTimer) { clearInterval(schedTimer); schedTimer = null; }
}

function schedTick() {
  if (!actx) return;
  const total = 8; // 4 intro + 4 phrase
  while (nextBeatAudio < actx.currentTime + LOOKAHEAD) {
    scheduleBeat(schedBeatIdx, nextBeatAudio);
    nextBeatAudio += beatSec;
    schedBeatIdx++;
    if (schedBeatIdx >= total) {
      stopScheduler();
      // End of phrase — transition to REVIEW after last beat duration
      const endDelay = (nextBeatAudio - actx.currentTime) * 1000;
      setTimeout(enterReview, endDelay);
      return;
    }
  }
}

function scheduleBeat(idx, t) {
  click(t, idx); // 4/4 click on every beat, accent on 0 and 4

  if (idx < 4) {
    // Intro: half-note chord (beats 0-1), half-note root (beats 2-3)
    const halfDur = beatSec * 2;
    if (idx === 0) {
      const root = KEY_ROOT[curKey];
      [root, root+4, root+7].forEach(m => pianoTone(midi2hz(m), t, halfDur, 0.15));
    } else if (idx === 2) {
      pianoTone(midi2hz(KEY_ROOT[curKey]), t, halfDur, 0.20);
    }
    vBeatQueue.push({ t, kind: 'intro', beat: idx });
  } else {
    const pi = idx - 4;
    beatAudioTimes[pi] = t;
    vBeatQueue.push({ t, kind: 'phrase', pi });
  }
}

// ── PITCH DETECTION & FILTERING ───────────────────────────────────────────────
const timeBuf = new Float32Array(4096);
const yinBuf  = new Float32Array(512);

function yinDetect(buf, sr) {
  const N = 1024, H = 512;
  // RMS gate
  let rms = 0;
  for (let i = 0; i < N; i++) rms += buf[i] * buf[i];
  if (Math.sqrt(rms / N) < 0.016) return null;

  // Difference function
  for (let t = 0; t < H; t++) {
    let s = 0;
    for (let i = 0; i < H; i++) { const d = buf[i] - buf[i+t]; s += d*d; }
    yinBuf[t] = s;
  }
  // Cumulative mean normalised
  yinBuf[0] = 1; let run = 0;
  for (let t = 1; t < H; t++) { run += yinBuf[t]; yinBuf[t] = yinBuf[t]*t/run; }

  // Find first dip below threshold
  const THR = 0.09; let t = 2;
  for (; t < H; t++) {
    if (yinBuf[t] < THR) {
      while (t+1 < H && yinBuf[t+1] < yinBuf[t]) t++;
      break;
    }
  }
  if (t >= H || yinBuf[t] >= THR) return null;

  // Parabolic interpolation
  const x0 = t > 0 ? t-1 : t, x2 = t+1 < H ? t+1 : t;
  let best;
  if (x0 === t)      best = yinBuf[t] <= yinBuf[x2] ? t : x2;
  else if (x2 === t) best = yinBuf[t] <= yinBuf[x0] ? t : x0;
  else { const a=yinBuf[x0],b=yinBuf[t],c=yinBuf[x2]; best=t+(c-a)/(2*(2*b-c-a)); }

  const hz = sr / best;
  return (hz > 70 && hz < 1100) ? hz : null;
}

// Pitch filter state
let filteredMidi  = null;  // current EMA output
let recentMidis   = [];    // last 8 valid readings for median (octave correction)
let holdFrames    = 0;     // frames to hold last pitch during silence
const HOLD_FRAMES = 5;     // ~83ms at 60fps before lifting pen
const EMA_ALPHA   = 0.55;  // responsive but smooth

function processPitch(hz) {
  if (hz === null) {
    if (holdFrames > 0) {
      holdFrames--;
      return filteredMidi; // hold last value briefly
    }
    // True silence — reset acquisition but keep filteredMidi for display fade
    return null;
  }

  holdFrames = HOLD_FRAMES;
  const rawMidi = hz2midi(hz);

  // Octave correction
  let corrected = rawMidi;
  if (recentMidis.length >= 4) {
    const sorted = [...recentMidis].sort((a,b)=>a-b);
    const median = sorted[Math.floor(sorted.length/2)];
    const diff   = rawMidi - median;
    if (Math.abs(diff) > 9) {
      // Check if it's an octave relationship
      const octDiff = Math.round(diff / 12) * 12;
      if (Math.abs(diff - octDiff) < 1.5) {
        corrected = rawMidi - octDiff; // snap to correct octave
      } else {
        // Spike — discard, return held value
        return filteredMidi;
      }
    }
  }

  // Update recent buffer
  recentMidis.push(corrected);
  if (recentMidis.length > 8) recentMidis.shift();

  // EMA — responsive (α=0.55)
  filteredMidi = filteredMidi === null
    ? corrected
    : EMA_ALPHA * corrected + (1 - EMA_ALPHA) * filteredMidi;

  return filteredMidi;
}

function resetPitchFilter() {
  filteredMidi = null;
  recentMidis  = [];
  holdFrames   = 0;
}

// ── CANVAS & GEOMETRY ─────────────────────────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx2d  = canvas.getContext('2d');
let geo      = null;
let noteBmp  = null;

// Pitch ring buffer [{t, midi}]
const PBUF = 350;
let pitchBuf = [];

// ResizeObserver — rebuilds on any layout/zoom change
let buildPending = false;
const resizeObs  = new ResizeObserver(() => {
  if (buildPending) return;
  buildPending = true;
  requestAnimationFrame(() => { buildPending = false; rebuildNotation(); });
});

function rebuildNotation() {
  const W   = canvas.parentElement.clientWidth - 28;
  const H   = 230;
  const dpr = window.devicePixelRatio || 1;

  canvas.width        = Math.round(W * dpr);
  canvas.height       = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  // Render VexFlow into a temporary logical-size canvas
  const tmp    = document.createElement('canvas');
  tmp.width    = W;
  tmp.height   = H;
  const renderer = new Renderer(tmp, Renderer.Backends.CANVAS);
  renderer.resize(W, H);
  const vf = renderer.getContext();

  // Background
  vf.save();
  vf.setFillStyle('#FDFAF4');
  vf.fillRect(0, 0, W, H);
  vf.restore();

  const staveY = 50;
  const margin = 10;
  const totalW = W - margin * 2;
  // Intro measure gets 42%, phrase measure gets 58%
  const m1W    = Math.round(totalW * 0.42);
  const m2W    = totalW - m1W;
  const m2X    = margin + m1W;

  // ── Measure 1: intro ──
  const stave1 = new Stave(margin, staveY, m1W);
  stave1.addClef('treble')
        .addKeySignature(VF_KEY[curKey])
        .addTimeSignature('4/4');
  stave1.setContext(vf).draw();

  const root  = KEY_ROOT[curKey];
  const chord = new StaveNote({
    keys: [midiToVFKey(root), midiToVFKey(root+4), midiToVFKey(root+7)],
    duration: 'h', auto_stem: true,
  });
  [root, root+4, root+7].forEach((m, i) => {
    const a = needsAcc(m, curKey); if (a) chord.addModifier(new Accidental(a), i);
  });

  const rootNote = new StaveNote({ keys:[midiToVFKey(root)], duration:'h', auto_stem:true });
  const a0 = needsAcc(root, curKey); if (a0) rootNote.addModifier(new Accidental(a0), 0);

  const v1 = new Voice({ num_beats:4, beat_value:4 }).setMode(Voice.Mode.SOFT);
  v1.addTickables([chord, rootNote]);
  new Formatter().joinVoices([v1]).format([v1], m1W - 72);
  v1.draw(vf, stave1);

  // ── Measure 2: phrase ──
  const stave2 = new Stave(m2X, staveY, m2W - margin);
  stave2.setContext(vf).draw();

  const phrase     = getPhrase();
  const staveNotes = phrase.map(midi => {
    const sn = new StaveNote({ keys:[midiToVFKey(midi)], duration:'q', auto_stem:true });
    const a  = needsAcc(midi, curKey); if (a) sn.addModifier(new Accidental(a), 0);
    return sn;
  });

  const v2 = new Voice({ num_beats:4, beat_value:4 }).setMode(Voice.Mode.SOFT);
  v2.addTickables(staveNotes);
  new Formatter().joinVoices([v2]).format([v2], m2W - margin - 12);
  v2.draw(vf, stave2);

  // Bar line between measures
  const tl = stave2.getYForLine(0);
  const bl = stave2.getYForLine(4);
  vf.save();
  vf.beginPath();
  vf.setStrokeStyle('#111');
  vf.setLineWidth(1.5);
  vf.moveTo(m2X, tl); vf.lineTo(m2X, bl);
  vf.stroke();
  vf.restore();

  // ── Extract geometry (logical pixels) ──
  const topY = stave2.getYForLine(0);
  const botY = stave2.getYForLine(4); // E4 = midi 64
  const sp   = (botY - topY) / 4;

  const noteXs = staveNotes.map(sn => {
    const bb = sn.getBoundingBox();
    return bb ? bb.getX() + bb.getW() / 2 : 0;
  });

  geo = {
    sp,
    refY:     botY,
    topY,
    noteXs,
    m2left:   m2X,
    m2right:  m2X + m2W - margin,
    phrase,   // midi values — kept here for midiToY reference
  };

  // Cache bitmap
  createImageBitmap(tmp).then(bmp => { noteBmp = bmp; drawFrame(); });
}

// ── COORDINATE MAPPING ────────────────────────────────────────────────────────
// E4 = midi 64 → geo.refY
// 1 semitone = geo.sp * 7/12
function midiToY(mf) {
  if (!geo) return 0;
  return geo.refY - (mf - 64) * geo.sp * (7 / 12);
}

// Map pitch sample audio time → canvas X
function pitchTimeToX(t) {
  if (!geo || !beatAudioTimes.length) return null;
  const N = beatAudioTimes.length;
  for (let i = 0; i < N; i++) {
    const t0 = beatAudioTimes[i];
    const t1 = i + 1 < N ? beatAudioTimes[i+1] : t0 + beatSec;
    if (t >= t0 && t < t1) {
      const x0 = geo.noteXs[i];
      const x1 = geo.noteXs[i+1] !== undefined ? geo.noteXs[i+1] : geo.m2right;
      return x0 + (x1 - x0) * ((t - t0) / (t1 - t0));
    }
  }
  // After last beat
  if (beatAudioTimes.length > 0 && t >= beatAudioTimes[N-1]) {
    const t0 = beatAudioTimes[N-1];
    const t1 = t0 + beatSec;
    const x0 = geo.noteXs[N-1];
    return x0 + (geo.m2right - x0) * Math.min(1, (t - t0) / (t1 - t0));
  }
  return null;
}

// ── DRAWING ───────────────────────────────────────────────────────────────────
function drawFrame() {
  if (!noteBmp) return;
  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.width  / dpr;
  const H   = canvas.height / dpr;

  ctx2d.save();
  ctx2d.scale(dpr, dpr);
  ctx2d.clearRect(0, 0, W, H);

  // 1. Notation
  ctx2d.drawImage(noteBmp, 0, 0, W, H);

  // 2. Pitch curve (clipped to phrase measure x bounds)
  if (geo && pitchBuf.length > 1) {
    ctx2d.save();
    // Clip to phrase measure area only
    ctx2d.beginPath();
    ctx2d.rect(geo.m2left, 0, geo.m2right - geo.m2left, H);
    ctx2d.clip();
    drawCurve(pitchBuf, 0.88, 2.0);
    // Leading dot
    const last = pitchBuf[pitchBuf.length - 1];
    const lx   = pitchTimeToX(last.t);
    const ly   = midiToY(last.midi);
    if (lx !== null) {
      ctx2d.fillStyle   = '#8B2020';
      ctx2d.shadowColor = '#8B2020';
      ctx2d.shadowBlur  = 7;
      ctx2d.beginPath(); ctx2d.arc(lx, ly, 2.8, 0, Math.PI*2); ctx2d.fill();
    }
    ctx2d.restore();
  }

  ctx2d.restore();
}

// Catmull-Rom spline — pen lifts on null/silence gaps
function drawCurve(pts, alpha, lw) {
  const proj = pts.map(p => {
    const x = pitchTimeToX(p.t);
    if (x === null) return null;
    return { x, y: midiToY(p.midi) };
  });

  ctx2d.strokeStyle = `rgba(139,32,32,${alpha})`;
  ctx2d.lineWidth   = lw;
  ctx2d.lineJoin    = 'round';
  ctx2d.lineCap     = 'round';

  let started = false;
  ctx2d.beginPath();

  for (let i = 0; i < proj.length; i++) {
    const p = proj[i];

    if (!p) {
      if (started) { ctx2d.stroke(); ctx2d.beginPath(); started = false; }
      continue;
    }

    // Lift pen on large spatial gap (held silence that snuck through)
    if (started && i > 0) {
      const prev = proj[i-1];
      if (prev && Math.abs(p.y - prev.y) > 90) {
        ctx2d.stroke(); ctx2d.beginPath(); started = false;
      }
    }

    if (!started) { ctx2d.moveTo(p.x, p.y); started = true; continue; }

    const p0 = proj[Math.max(0, i-1)]             || p;
    const p1 = p;
    const p2 = proj[Math.min(proj.length-1, i+1)] || p;
    const p3 = proj[Math.min(proj.length-1, i+2)] || p2;

    if (!p0 || !p2) { ctx2d.lineTo(p.x, p.y); continue; }

    ctx2d.bezierCurveTo(
      p1.x + (p2.x - p0.x) / 6,
      p1.y + (p2.y - p0.y) / 6,
      p2.x - (p3.x - p1.x) / 6,
      p2.y - (p3.y - p1.y) / 6,
      p2.x, p2.y
    );
  }
  if (started) ctx2d.stroke();
}

// ── RAF LOOP ──────────────────────────────────────────────────────────────────
let rafId    = null;
let singing  = false; // true only during SING state

function rafLoop() {
  if (STATE === 'READY' || STATE === 'REVIEW') return;
  rafId = requestAnimationFrame(rafLoop);

  const now = actx ? actx.currentTime : 0;

  // Drain visual beat queue
  while (vBeatQueue.length && vBeatQueue[0].t <= now) {
    const b = vBeatQueue.shift();
    if (b.kind === 'intro') {
      singing = false;
      if (b.beat === 0) setStatus('Listen — tonic chord');
      if (b.beat === 2) setStatus('Listen — root note');
    } else {
      singing = true;
      if (b.pi === 0) { setState('SING'); }
    }
  }

  // Pitch detection — only while singing
  if (singing && analyser) {
    analyser.getFloatTimeDomainData(timeBuf);
    const hz = yinDetect(timeBuf, actx.sampleRate);
    const sm = processPitch(hz);

    if (sm !== null) {
      const nearest = Math.round(sm);
      const cents   = (sm - nearest) * 100;
      const absC    = Math.abs(cents);
      const cl      = absC < 25 ? 'on' : absC < 50 ? 'amber' : 'off';
      const noteName = NOTE_NAMES[mpc(nearest)];

      const nn = document.getElementById('prNote');
      nn.textContent = noteName;
      nn.className   = `pr-note ${cl}`;
      document.getElementById('prCents').textContent = (cents >= 0 ? '+' : '') + cents.toFixed(0) + '¢';
      document.getElementById('prHz').textContent    = hz ? hz.toFixed(1) + ' Hz' : '';

      pitchBuf.push({ t: now, midi: sm });
      if (pitchBuf.length > PBUF) pitchBuf.shift();
    }
    // When hz is null, processPitch holds the last value or returns null
    // Either way we don't add to buffer — pen lifts naturally
  }

  drawFrame();
}

// ── SESSION CONTROL ───────────────────────────────────────────────────────────
function enterIntro() {
  if (!actx) return;
  pitchBuf   = [];
  singing    = false;
  beatSec    = 60 / bpm;
  resetPitchFilter();
  setState('INTRO');
  startScheduler();
  rafId = requestAnimationFrame(rafLoop);
}

function enterReview() {
  singing = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  stopScheduler();
  setState('REVIEW');
  drawFrame(); // freeze curve on screen
}

function stopAll() {
  singing = false;
  stopScheduler();
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

// ── MIC INIT ──────────────────────────────────────────────────────────────────
async function initMic() {
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
    const src = actx.createMediaStreamSource(stream);
    analyser  = actx.createAnalyser();
    analyser.fftSize = 4096;
    analyser.smoothingTimeConstant = 0;
    src.connect(analyser);
    return true;
  } catch(e) { return false; }
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
}

function clearPitchDisplay() {
  document.getElementById('prNote').textContent   = '—';
  document.getElementById('prNote').className     = 'pr-note';
  document.getElementById('prCents').textContent  = '';
  document.getElementById('prHz').textContent     = '';
}

function buildDrillRow() {
  const c = document.getElementById('drillRow'); c.innerHTML = '';
  DRILLS.forEach((d, i) => {
    const b = document.createElement('button');
    b.className   = 'chip' + (i === curDrill ? ' sel' : '');
    b.textContent = d.name;
    b.onclick     = () => {
      if (STATE !== 'READY' && STATE !== 'REVIEW') { stopAll(); }
      curDrill = i;
      document.querySelectorAll('.chip').forEach((el,j) => el.classList.toggle('sel', j===i));
      pitchBuf = [];
      rebuildNotation();
      setState('READY');
    };
    c.appendChild(b);
  });
}

// ── WIRING ────────────────────────────────────────────────────────────────────
document.getElementById('grantBtn').onclick = async () => {
  const ok = await initMic();
  if (ok) {
    document.getElementById('ov').classList.add('gone');
    setState('READY');
  } else {
    const e = document.getElementById('ovErr');
    e.style.display = 'block';
    e.textContent   = 'Microphone access denied — check browser permissions and reload.';
  }
};

document.getElementById('btnStart').onclick = () => {
  if (!actx) return;
  if (actx.state === 'suspended') actx.resume().then(enterIntro);
  else enterIntro();
};

document.getElementById('btnStop').onclick = () => {
  stopAll();
  pitchBuf = [];
  setState('READY');
  drawFrame();
};

document.getElementById('btnRetry').onclick = () => {
  // Same drill — replay from intro
  pitchBuf = [];
  if (actx.state === 'suspended') actx.resume().then(enterIntro);
  else enterIntro();
};

document.getElementById('btnNew').onclick = () => {
  // Advance to next drill
  curDrill = (curDrill + 1) % DRILLS.length;
  document.querySelectorAll('.chip').forEach((el,j) => el.classList.toggle('sel', j===curDrill));
  pitchBuf = [];
  rebuildNotation();
  setState('READY');
};

document.getElementById('bpmR').oninput = function() {
  bpm    = +this.value;
  beatSec = 60 / bpm;
  document.getElementById('bpmV').textContent = bpm;
};

document.getElementById('keyS').onchange = function() {
  curKey = this.value;
  if (STATE !== 'READY') { stopAll(); setState('READY'); }
  pitchBuf = [];
  rebuildNotation();
};

// ── BOOT ──────────────────────────────────────────────────────────────────────
buildDrillRow();
resizeObs.observe(canvas.parentElement);
requestAnimationFrame(() => requestAnimationFrame(() => rebuildNotation()));
</script>
</body>
</html>
