<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SightSing</title>
<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:     #F7F3ED;
  --paper:     #FDFAF6;
  --ink:       #111111;
  --ink2:      #444444;
  --rule:      #C8C0B4;
  --muted:     #888070;
  --accent:    #8B2E2E;
  --green:     #2A7A4B;
  --gold:      #9B7A00;
  --ui:        #EDE8E0;
  --uiBorder:  #D4CEC4;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Libre Baskerville', serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 20px 12px;
  gap: 10px;
  height: 100vh;
}

/* HEADER */
.hdr { width:100%; max-width:940px; display:flex; align-items:baseline; gap:14px; }
.logo { font-size:1.35rem; font-weight:700; letter-spacing:.02em; }
.logo em { font-style:italic; font-weight:400; color:var(--accent); }
.tagline { font-family:'IBM Plex Mono',monospace; font-size:.57rem; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; }

/* STAFF CARD — two stacked canvases */
.staff-card {
  width:100%; max-width:940px;
  background:var(--paper);
  border:1px solid var(--uiBorder);
  border-radius:3px;
  padding:16px 20px 10px;
  box-shadow:0 1px 6px rgba(0,0,0,.07);
  flex-shrink:0;
  position:relative;
}
.canvas-wrap {
  position:relative;
  width:100%;
  /* height set by JS */
}
/* VexFlow renders into #vfCanvas; overlay drawn on #overlayCanvas */
#vfCanvas, #overlayCanvas {
  position:absolute; top:0; left:0;
  display:block; width:100%;
}
#vfCanvas { z-index:1; }
#overlayCanvas { z-index:2; pointer-events:none; }

/* CONTROLS */
.controls { width:100%; max-width:940px; display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
.btn {
  font-family:'Libre Baskerville',serif; font-size:.82rem;
  padding:7px 18px; border-radius:2px;
  border:1px solid var(--uiBorder); background:var(--paper); color:var(--ink2);
  cursor:pointer; transition:all .12s;
}
.btn:hover { background:var(--ui); }
.btn.primary { background:var(--ink); color:var(--paper); border-color:var(--ink); font-weight:700; }
.btn.primary:hover { background:var(--ink2); }
.btn.primary:disabled, .btn.danger:disabled { opacity:.3; cursor:default; pointer-events:none; }
.btn.danger { color:var(--accent); border-color:var(--accent); }
.btn.danger:hover { background:var(--accent); color:var(--paper); }
.ctrl { display:flex; align-items:center; gap:6px; }
.clbl { font-family:'IBM Plex Mono',monospace; font-size:.58rem; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }
select {
  font-family:'Libre Baskerville',serif; font-size:.78rem;
  background:var(--paper); border:1px solid var(--uiBorder);
  color:var(--ink); padding:5px 7px; border-radius:2px; cursor:pointer;
}
input[type=range] { width:68px; accent-color:var(--ink); cursor:pointer; }
.num { font-family:'IBM Plex Mono',monospace; font-size:.72rem; color:var(--ink2); min-width:22px; }

/* STATUS BAR */
.statusbar {
  width:100%; max-width:940px;
  display:flex; align-items:center; gap:12px;
  padding:7px 13px;
  background:var(--paper); border:1px solid var(--uiBorder); border-radius:2px;
}
.dot { width:7px; height:7px; border-radius:50%; background:var(--rule); transition:all .2s; flex-shrink:0; }
.dot.prep { background:var(--gold); animation:pulse .45s infinite; }
.dot.live { background:var(--green); animation:pulse .9s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
.smsg { font-family:'IBM Plex Mono',monospace; font-size:.6rem; color:var(--muted); }
.beats { display:flex; gap:5px; }
.bp { width:8px; height:8px; border-radius:50%; background:var(--rule); transition:background .05s,transform .05s; }
.bp.on { background:var(--ink); transform:scale(1.5); }
.bp.b1.on { background:var(--accent); }
.sp { flex:1; }
.nread { display:flex; align-items:baseline; gap:8px; }
.nrn { font-size:1.2rem; font-weight:700; color:var(--ink); min-width:26px; transition:color .08s; }
.nrn.on { color:var(--green); } .nrn.near { color:var(--accent); }
.nrc { font-family:'IBM Plex Mono',monospace; font-size:.62rem; color:var(--muted); min-width:40px; }
.nrh { font-family:'IBM Plex Mono',monospace; font-size:.6rem; color:var(--muted); min-width:62px; text-align:right; }

/* PASS / EXERCISE ROW */
.pass-row { width:100%; max-width:940px; display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
.plbl { font-family:'IBM Plex Mono',monospace; font-size:.57rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.ppip { width:9px; height:9px; border-radius:50%; border:1.5px solid var(--rule); transition:all .2s; }
.ppip.done { background:var(--green); border-color:var(--green); }
.ppip.active { border-color:var(--ink); }
.ppips { display:flex; gap:5px; }
.sep { width:1px; height:14px; background:var(--rule); margin:0 2px; }
.chips { display:flex; gap:5px; flex-wrap:wrap; }
.chip {
  font-family:'IBM Plex Mono',monospace; font-size:.57rem; letter-spacing:.02em;
  padding:3px 9px; border-radius:20px;
  border:1px solid var(--uiBorder); background:var(--paper); color:var(--muted);
  cursor:pointer; transition:all .12s;
}
.chip:hover { border-color:var(--ink2); color:var(--ink); }
.chip.sel { background:var(--ink); color:var(--paper); border-color:var(--ink); }

/* OVERLAY */
.ov {
  position:fixed; inset:0; z-index:99;
  background:rgba(247,243,237,.95); backdrop-filter:blur(8px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; padding:40px; text-align:center;
}
.ov.gone { display:none; }
.ov-title { font-size:1.9rem; font-weight:700; }
.ov-title em { font-style:italic; font-weight:400; color:var(--accent); }
.ov-body { font-size:.95rem; color:var(--muted); line-height:1.75; max-width:360px; }
.ov-btn {
  font-family:'Libre Baskerville',serif; font-size:.88rem; font-weight:700;
  padding:10px 28px; border-radius:2px; border:none;
  background:var(--ink); color:var(--paper); cursor:pointer; transition:all .12s;
}
.ov-btn:hover { background:var(--ink2); }
.ov-err { font-family:'IBM Plex Mono',monospace; font-size:.65rem; color:var(--accent); display:none; }
</style>
</head>
<body>

<div class="ov" id="ov">
  <div class="ov-title">Sight<em>Sing</em></div>
  <div class="ov-body">Real-time pitch training.<br>Microphone access is required to hear your voice.</div>
  <button class="ov-btn" id="grantBtn">Allow microphone</button>
  <div class="ov-err" id="ovErr"></div>
</div>

<div class="hdr">
  <span class="logo">Sight<em>Sing</em></span>
  <span class="tagline">pitch training</span>
</div>

<div class="staff-card">
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="vfCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
  </div>
</div>

<div class="controls">
  <button class="btn primary" id="startBtn">Start</button>
  <button class="btn danger"  id="stopBtn"  disabled>Stop</button>
  <button class="btn"         id="newBtn">↻ New phrase</button>
  <div class="ctrl">
    <span class="clbl">BPM</span>
    <input type="range" id="bpmR" min="40" max="120" value="72">
    <span class="num"   id="bpmV">72</span>
  </div>
  <div class="ctrl">
    <span class="clbl">Key</span>
    <select id="keyS">
      <option value="C">C major</option>
      <option value="G">G major</option>
      <option value="F">F major</option>
      <option value="D">D major</option>
      <option value="Bb">B♭ major</option>
      <option value="A">A major</option>
    </select>
  </div>
  <div class="ctrl">
    <span class="clbl">Passes</span>
    <select id="passS">
      <option value="3">3×</option>
      <option value="4" selected>4×</option>
      <option value="5">5×</option>
    </select>
  </div>
</div>

<div class="statusbar">
  <div class="dot" id="dot"></div>
  <span class="smsg" id="smsg">Allow microphone, then press Start</span>
  <div class="beats" id="bts"></div>
  <div class="sp"></div>
  <div class="nread">
    <span class="nrn" id="nrn">—</span>
    <span class="nrc" id="nrc">± 0¢</span>
    <span class="nrh" id="nrh">— Hz</span>
  </div>
</div>

<div class="pass-row">
  <span class="plbl">Pass</span>
  <div class="ppips" id="ppips"></div>
  <div class="sep"></div>
  <div class="chips" id="chips"></div>
</div>

<script>
'use strict';

// ── VexFlow alias ──────────────────────────────────────────────────────────────
const { Renderer, Stave, StaveNote, Voice, Formatter, Accidental, StaveConnector } = Vex.Flow;

// ── THEORY ────────────────────────────────────────────────────────────────────
const CHR = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const hz2midi = hz => 69 + 12 * Math.log2(hz / 440);
const mpc     = m  => ((m % 12) + 12) % 12;
const moct    = m  => Math.floor(m / 12) - 1;

// VexFlow note key string from midi
function midiToVFKey(midi) {
  const names = ['c','c','d','d','e','f','f','g','g','a','a','b'];
  const acc   = ['' ,'#','', '#', '','', '#','', '#', '', '#', ''];
  const p = mpc(midi), o = moct(midi);
  return `${names[p]}${acc[p]}/${o}`;
}

const KEY_ROOT = { C:60, G:67, D:62, A:69, F:65, Bb:70 };

// VexFlow key signature strings
const VF_KEY = { C:'C', G:'G', D:'D', A:'A', F:'F', Bb:'Bb' };

function majScale(root) {
  return [0,2,4,5,7,9,11,12].map(i => root + i);
}

const EXERS = [
  { id:'scale_up', name:'Scale ↑',  make: k => majScale(KEY_ROOT[k]) },
  { id:'scale_ud', name:'Scale ↑↓', make: k => { const s=majScale(KEY_ROOT[k]); return [...s,[...s].reverse().slice(1)].flat(); }},
  { id:'thirds',   name:'Thirds',   make: k => { const s=majScale(KEY_ROOT[k]); return [s[0],s[2],s[1],s[3],s[2],s[4],s[3],s[5]]; }},
  { id:'triad',    name:'Triad',    make: k => { const s=majScale(KEY_ROOT[k]); return [s[0],s[2],s[4],s[7],s[4],s[2],s[0]]; }},
  { id:'leaps',    name:'Leaps',    make: k => { const s=majScale(KEY_ROOT[k]); return [s[0],s[4],s[1],s[5],s[2],s[6],s[3],s[7]]; }},
  { id:'random',   name:'Random',   make: k => { const s=[...majScale(KEY_ROOT[k])]; for(let i=s.length-1;i>0;i--){const j=0|Math.random()*(i+1);[s[i],s[j]]=[s[j],s[i]];} return s; }},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let actx = null, analyser = null;
let running = false, inPrep = false;
let bpm = 72, totalPass = 4, curKey = 'C', curExIdx = 0;
let phrase = [];          // midi numbers
let noteXCenters = [];    // pixel X of each notehead (from VexFlow)
let staffY = {};          // {top, bottom, lineY[]} from VexFlow stave

// Timing (Web Audio lookahead scheduler)
let beatSec = 0;
let scheduledBeats = []; // {time: audioCtx seconds, beatIdx: int, isPrep: bool}
let nextBeatTime = 0;
let beatIdx = 0;          // prep beats then phrase beats
let PREP_BEATS = 4;
let totalBeats = 0;       // PREP_BEATS + phrase.length
let pass = 0;

// Visual beat tracking (read by RAF)
let currentVisualBeat = -1; // phrase beat index (0-based), -1 = not started
let lastScheduledAudioTime = 0;

// Pitch
let pitchHist = [], HLEN = 5;
let smMidi = null, nearMidi = null, onPitch = false;

// Curve: rolling buffer of {x, y, valid} per pass
let allCurves = [];   // [passIdx] = [{x,y}]
let curCurve  = [];
let rafId = null;
let schedInterval = null;

// YIN buffers
const timeBuf = new Float32Array(4096);
const yinTmp  = new Float32Array(512);

// ── YIN PITCH DETECTION ───────────────────────────────────────────────────────
function detectHz(buf, sr) {
  const N = 1024, half = 512;
  let rms = 0;
  for (let i = 0; i < N; i++) rms += buf[i] * buf[i];
  if (Math.sqrt(rms / N) < 0.018) return null;

  for (let t = 0; t < half; t++) {
    let s = 0;
    for (let i = 0; i < half; i++) { const d = buf[i] - buf[i+t]; s += d*d; }
    yinTmp[t] = s;
  }
  yinTmp[0] = 1;
  let run = 0;
  for (let t = 1; t < half; t++) { run += yinTmp[t]; yinTmp[t] = yinTmp[t] * t / run; }

  const THR = 0.10;
  let t = 2;
  for (; t < half; t++) { if (yinTmp[t] < THR) { while (t+1 < half && yinTmp[t+1] < yinTmp[t]) t++; break; } }
  if (t >= half || yinTmp[t] >= THR) return null;

  const x0 = t > 0 ? t-1 : t, x2 = t+1 < half ? t+1 : t;
  let best;
  if (x0 === t) best = yinTmp[t] <= yinTmp[x2] ? t : x2;
  else if (x2 === t) best = yinTmp[t] <= yinTmp[x0] ? t : x0;
  else { const a=yinTmp[x0],b=yinTmp[t],c=yinTmp[x2]; best = t + (c-a)/(2*(2*b-c-a)); }

  const hz = sr / best;
  return (hz > 70 && hz < 1100) ? hz : null;
}

function pushPitch(hz) {
  if (hz === null) { pitchHist = pitchHist.slice(-2); }
  else { pitchHist.push(hz2midi(hz)); if (pitchHist.length > HLEN) pitchHist.shift(); }
  if (!pitchHist.length) return null;
  // EMA on most recent
  let ema = pitchHist[0];
  for (let i = 1; i < pitchHist.length; i++) ema = 0.35 * pitchHist[i] + 0.65 * ema;
  return ema;
}

// ── VEXFLOW RENDERING ─────────────────────────────────────────────────────────
let vfRenderer = null;

function buildNotation() {
  const wrap = document.getElementById('canvasWrap');
  const W    = wrap.clientWidth;
  const H    = 210;

  // Size both canvases
  ['vfCanvas','overlayCanvas'].forEach(id => {
    const c = document.getElementById(id);
    c.width  = W * (window.devicePixelRatio || 1);
    c.height = H * (window.devicePixelRatio || 1);
    c.style.width  = W + 'px';
    c.style.height = H + 'px';
    const cx = c.getContext('2d');
    cx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  });
  wrap.style.height = H + 'px';

  // Clear VF canvas
  const vfc = document.getElementById('vfCanvas');
  const vfCtx = vfc.getContext('2d');
  vfCtx.clearRect(0, 0, W, H);
  vfCtx.fillStyle = '#FDFAF6';
  vfCtx.fillRect(0, 0, W, H);

  // VexFlow renderer on the vfCanvas 2d context directly
  if (vfRenderer) vfRenderer = null;
  vfRenderer = new Renderer(vfc, Renderer.Backends.CANVAS);
  vfRenderer.resize(W * (window.devicePixelRatio||1), H * (window.devicePixelRatio||1));
  const vfCtxVF = vfRenderer.getContext();
  vfCtxVF.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  vfCtxVF.setFont('Arial', 10);

  const staveY  = 40;
  const staveH  = H - 80; // VexFlow auto-sizes internally
  const margin  = 14;

  // ── Measure 1: tonic chord (whole note) ──
  const m1W = 110;
  const stave1 = new Stave(margin, staveY, m1W);
  stave1.addClef('treble').addKeySignature(VF_KEY[curKey]).addTimeSignature('4/4');
  stave1.setContext(vfCtxVF).draw();

  // Tonic chord: root, 3rd, 5th
  const root = KEY_ROOT[curKey];
  const chordMidis = [root, root+4, root+7];
  const chordKeys  = chordMidis.map(midiToVFKey);
  const chordNote  = new StaveNote({ keys: chordKeys, duration: 'w', auto_stem: true });

  // Add accidentals required by key for each chord note
  chordMidis.forEach((m, i) => {
    const p = mpc(m);
    if ([1,3,6,8,10].includes(p)) {
      // it's a chromatic note — check if key sig covers it
      const acc = [1,6,8].includes(p) ? '#' : 'b';
      // only add if not already in key sig
      const ks = VF_KEY[curKey];
      if (ks === 'C' || ks === 'F' || ks === 'Bb') {
        if (acc === '#') chordNote.addModifier(new Accidental('#'), i);
      }
    }
  });

  const voice1 = new Voice({ num_beats:4, beat_value:4 });
  voice1.addTickables([chordNote]);
  new Formatter().joinVoices([voice1]).format([voice1], m1W - 40);
  voice1.draw(vfCtxVF, stave1);

  // ── Measure 2+: phrase notes ──
  const m2X = margin + m1W;
  const m2W = W - m2X - margin;
  const stave2 = new Stave(m2X, staveY, m2W);
  stave2.setContext(vfCtxVF).draw();

  // Build StaveNotes from phrase
  const staveNotes = phrase.map(midi => {
    const key = midiToVFKey(midi);
    const sn  = new StaveNote({ keys:[key], duration:'q', auto_stem:true });
    // accidental if needed (chromatic notes not in key sig)
    const p = mpc(midi);
    if ([1,3,6,8,10].includes(p)) {
      const ks = VF_KEY[curKey];
      const isSharp = [1,3,6,8,10].includes(p) && !['F','Bb'].includes(ks);
      sn.addModifier(new Accidental(isSharp ? '#' : 'b'), 0);
    }
    return sn;
  });

  // Fill remaining beats with rests if needed for Voice (must equal 4/4 per measure)
  // We'll use a flexible voice instead
  const voice2 = new Voice({ num_beats: phrase.length, beat_value: 4 }).setMode(Voice.Mode.SOFT);
  voice2.addTickables(staveNotes);
  new Formatter().joinVoices([voice2]).format([voice2], m2W - 20);
  voice2.draw(vfCtxVF, stave2);

  // ── Collect notehead X centers from rendered notes ──
  noteXCenters = staveNotes.map(sn => {
    const bb = sn.getBoundingBox();
    return bb ? bb.x + bb.w / 2 : 0;
  });

  // ── Collect staff Y geometry from stave2 ──
  const topY    = stave2.getYForLine(0);   // top staff line
  const bottomY = stave2.getYForLine(4);   // bottom staff line
  const lineYs  = [0,1,2,3,4].map(l => stave2.getYForLine(l));
  staffY = { top: topY, bottom: bottomY, lineYs, stave: stave2 };

  // Draw bar line between measures
  vfCtxVF.save();
  vfCtxVF.strokeStyle = '#111';
  vfCtxVF.lineWidth = 1.5;
  vfCtxVF.beginPath();
  vfCtxVF.moveTo(m2X, topY);
  vfCtxVF.lineTo(m2X, bottomY);
  vfCtxVF.stroke();
  vfCtxVF.restore();

  // Clear overlay
  clearOverlay();
}

// ── OVERLAY DRAWING ───────────────────────────────────────────────────────────
function clearOverlay() {
  const cv  = document.getElementById('overlayCanvas');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width / (window.devicePixelRatio||1), cv.height / (window.devicePixelRatio||1));
}

// Map smoothed midi float → canvas Y using staff geometry
function midiToOverlayY(mf) {
  if (!staffY.lineYs) return 0;
  // E4 = midi 64 = bottom staff line (lineYs[4])
  // Staff space = (lineYs[4] - lineYs[0]) / 4
  const sp = (staffY.lineYs[4] - staffY.lineYs[0]) / 4;
  // Chromatic: 1 semitone = sp * 7/12
  return staffY.lineYs[4] - (mf - 64) * sp * 7 / 12;
}

function drawOverlay() {
  const cv  = document.getElementById('overlayCanvas');
  const ctx = cv.getContext('2d');
  const W   = cv.width  / (window.devicePixelRatio||1);
  const H   = cv.height / (window.devicePixelRatio||1);
  ctx.clearRect(0, 0, W, H);

  if (!phrase.length || !staffY.lineYs) return;

  // ── Playhead ──
  if (running && !inPrep && currentVisualBeat >= 0 && currentVisualBeat < phrase.length) {
    // Interpolate playhead X between current and next note
    const x0 = noteXCenters[currentVisualBeat] || 0;
    const x1 = noteXCenters[currentVisualBeat + 1] || (x0 + 30);

    // Progress within current beat using AudioContext time
    let prog = 0;
    if (actx) {
      const elapsed = actx.currentTime - lastScheduledAudioTime;
      prog = Math.min(1, elapsed / beatSec);
    }
    const px = x0 + (x1 - x0) * prog;

    ctx.save();
    ctx.strokeStyle = 'rgba(139,46,46,0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 5]);
    ctx.beginPath();
    ctx.moveTo(px, staffY.top - 12);
    ctx.lineTo(px, staffY.bottom + 12);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // ── Previous pass curves (ghosted) ──
  allCurves.forEach((curve, pi) => {
    if (!curve.length) return;
    const age = pass - pi;
    if (age <= 0 || age > totalPass) return;
    const alpha = Math.max(0.04, 0.18 - age * 0.04);
    drawCurve(ctx, curve, `rgba(139,46,46,${alpha})`, 1.0);
  });

  // ── Current curve ──
  if (curCurve.length > 1) {
    drawCurve(ctx, curCurve, 'rgba(139,46,46,0.78)', 1.8);
    // leading dot
    const last = curCurve[curCurve.length - 1];
    ctx.save();
    ctx.fillStyle = '#8B2E2E';
    ctx.beginPath(); ctx.arc(last.x, last.y, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── Active notehead highlight ──
  if (running && !inPrep && currentVisualBeat >= 0 && currentVisualBeat < phrase.length) {
    const x = noteXCenters[currentVisualBeat];
    const y = midiToOverlayY(phrase[currentVisualBeat]);
    const col = onPitch ? 'rgba(42,122,75,0.18)' : 'rgba(139,46,46,0.10)';
    const strokeCol = onPitch ? '#2A7A4B' : '#8B2E2E';
    ctx.save();
    ctx.fillStyle = col;
    ctx.strokeStyle = strokeCol;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }
}

function drawCurve(ctx, pts, color, lw) {
  if (pts.length < 2) return;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = lw;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(0, i-1)], p1 = pts[i], p2 = pts[i+1], p3 = pts[Math.min(pts.length-1, i+2)];
    ctx.bezierCurveTo(
      p1.x + (p2.x-p0.x)/6, p1.y + (p2.y-p0.y)/6,
      p2.x - (p3.x-p1.x)/6, p2.y - (p3.y-p1.y)/6,
      p2.x, p2.y
    );
  }
  ctx.stroke(); ctx.restore();
}

// ── TONIC CHORD SYNTH ─────────────────────────────────────────────────────────
function playTonicChord(duration) {
  if (!actx) return;
  const root = KEY_ROOT[curKey];
  [root, root+4, root+7].forEach((midi, i) => {
    const hz = 440 * Math.pow(2, (midi - 69) / 12);
    // Fundamental
    const osc = actx.createOscillator();
    const env = actx.createGain();
    osc.connect(env); env.connect(actx.destination);
    osc.type = 'triangle';
    osc.frequency.value = hz;
    const now = actx.currentTime;
    const vel = [0.22, 0.16, 0.14][i];
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(vel, now + 0.008);
    env.gain.exponentialRampToValueAtTime(vel * 0.35, now + 0.6);
    env.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    osc.start(now); osc.stop(now + duration + 0.05);
    // 2nd harmonic for brightness
    const osc2 = actx.createOscillator();
    const env2 = actx.createGain();
    osc2.connect(env2); env2.connect(actx.destination);
    osc2.type = 'sine';
    osc2.frequency.value = hz * 2;
    env2.gain.setValueAtTime(0, now);
    env2.gain.linearRampToValueAtTime(vel * 0.12, now + 0.008);
    env2.gain.exponentialRampToValueAtTime(0.0001, now + duration * 0.4);
    osc2.start(now); osc2.stop(now + duration * 0.4 + 0.05);
  });
}

// ── METRONOME CLICK ──────────────────────────────────────────────────────────
function scheduleClick(time, accent) {
  if (!actx) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.connect(g); g.connect(actx.destination);
  o.frequency.value = accent ? 1050 : 660;
  g.gain.setValueAtTime(accent ? 0.18 : 0.07, time);
  g.gain.exponentialRampToValueAtTime(0.0001, time + 0.055);
  o.start(time); o.stop(time + 0.06);
}

// ── SCHEDULER (Chris Wilson pattern) ─────────────────────────────────────────
const LOOKAHEAD = 0.1;   // seconds to look ahead
const SCHEDULE_INTERVAL = 25; // ms

function scheduler() {
  if (!running || !actx) return;
  while (nextBeatTime < actx.currentTime + LOOKAHEAD) {
    scheduleBeat(nextBeatTime, beatIdx);
    nextBeatTime += beatSec;
    beatIdx++;
    if (beatIdx >= totalBeats) {
      // end of pass
      setTimeout(() => advancePass(), (nextBeatTime - actx.currentTime) * 1000);
      stopScheduler();
      return;
    }
  }
}

function scheduleBeat(time, idx) {
  const isPrepBeat  = idx < PREP_BEATS;
  const phraseIdx   = idx - PREP_BEATS;
  const isAccent    = (isPrepBeat ? idx : phraseIdx) === 0;

  scheduleClick(time, isAccent);
  scheduledBeats.push({ time, phraseIdx: isPrepBeat ? -1 : phraseIdx });
}

function stopScheduler() {
  if (schedInterval) { clearInterval(schedInterval); schedInterval = null; }
}

function advancePass() {
  if (!running) return;
  allCurves[pass] = [...curCurve];
  curCurve = [];
  pass++;
  renderPassPips();

  if (pass >= totalPass) {
    stopSession();
    setStatus('Complete — press Start to repeat', 'idle');
    return;
  }
  setStatus(`Pass ${pass + 1} of ${totalPass}`, 'live');
  startPass();
}

function startPass() {
  beatIdx      = 0;
  inPrep       = true;
  currentVisualBeat = -1;
  nextBeatTime = actx.currentTime + 0.15; // small delay before first beat
  scheduledBeats = [];
  schedInterval = setInterval(scheduler, SCHEDULE_INTERVAL);
  scheduler(); // immediate first call
}

// ── RAF LOOP ──────────────────────────────────────────────────────────────────
function rafLoop() {
  if (!running) return;
  rafId = requestAnimationFrame(rafLoop);

  // Consume scheduled beats that have passed
  const now = actx ? actx.currentTime : 0;
  while (scheduledBeats.length && scheduledBeats[0].time <= now) {
    const beat = scheduledBeats.shift();
    if (beat.phraseIdx === -1) {
      // prep beat
      inPrep = true;
      const prepBeat = PREP_BEATS - scheduledBeats.filter(b=>b.phraseIdx===-1).length - 1;
      updateBeatDots(prepBeat % 4, true);
      setStatus('Preparation bar…', 'prep');
    } else {
      inPrep = false;
      currentVisualBeat = beat.phraseIdx;
      lastScheduledAudioTime = beat.time;
      updateBeatDots(beat.phraseIdx % 4, false);
      if (beat.phraseIdx === 0) setStatus(`Pass ${pass + 1} of ${totalPass}`, 'live');
    }
  }

  // Pitch detection
  if (analyser) {
    analyser.getFloatTimeDomainData(timeBuf);
    const hz  = detectHz(timeBuf, actx.sampleRate);
    const sm  = pushPitch(hz);

    if (sm !== null) {
      smMidi   = sm;
      nearMidi = Math.round(sm);
      const cents = (sm - nearMidi) * 100;
      onPitch = Math.abs(cents) < 30;

      document.getElementById('nrh').textContent  = hz ? hz.toFixed(1) + ' Hz' : '— Hz';
      const nn = document.getElementById('nrn');
      nn.textContent  = CHR[mpc(nearMidi)];
      nn.className    = 'nrn ' + (onPitch ? 'on' : 'near');
      const sign = cents >= 0 ? '+' : '';
      document.getElementById('nrc').textContent = sign + cents.toFixed(0) + '¢';

      // Add to curve while singing
      if (!inPrep && currentVisualBeat >= 0 && currentVisualBeat < phrase.length) {
        // X: interpolate between noteXCenters
        const x0 = noteXCenters[currentVisualBeat] || 0;
        const x1 = noteXCenters[currentVisualBeat + 1] || x0 + 40;
        const elapsed = Math.min(actx.currentTime - lastScheduledAudioTime, beatSec);
        const prog = elapsed / beatSec;
        const x = x0 + (x1 - x0) * prog;
        const y = midiToOverlayY(sm);
        curCurve.push({ x, y });
        if (curCurve.length > 800) curCurve.shift();
      }
    } else {
      smMidi = null; nearMidi = null; onPitch = false;
      document.getElementById('nrh').textContent = '— Hz';
      document.getElementById('nrn').textContent = '—';
      document.getElementById('nrn').className   = 'nrn';
      document.getElementById('nrc').textContent = '± 0¢';
    }
  }

  drawOverlay();
}

// ── SESSION CONTROL ───────────────────────────────────────────────────────────
async function startSession() {
  if (!actx) return;
  if (actx.state === 'suspended') await actx.resume();

  running   = true;
  pass      = 0;
  allCurves = [];
  curCurve  = [];
  pitchHist = [];
  totalBeats = PREP_BEATS + phrase.length;
  beatSec    = 60 / bpm;

  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').disabled  = false;

  renderPassPips();
  buildBeatDots();

  // Play tonic chord for 1 measure before prep
  const chordDur = beatSec * 4;
  playTonicChord(chordDur);
  setStatus('Listen to the tonic chord…', 'prep');

  // Wait one measure, then start prep beats
  setTimeout(() => {
    if (!running) return;
    startPass();
    rafLoop();
  }, chordDur * 1000);
}

function stopSession() {
  running = false;
  stopScheduler();
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled  = true;
  currentVisualBeat = -1;
  updateBeatDots(-1, false);
  drawOverlay();
}

// ── MIC ───────────────────────────────────────────────────────────────────────
async function initMic() {
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
    const src = actx.createMediaStreamSource(stream);
    analyser = actx.createAnalyser();
    analyser.fftSize = 4096;
    analyser.smoothingTimeConstant = 0;
    src.connect(analyser);
    return true;
  } catch(e) { return false; }
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  document.getElementById('smsg').textContent = msg;
  const d = document.getElementById('dot');
  d.className = 'dot' + (type==='live' ? ' live' : type==='prep' ? ' prep' : '');
}

function buildBeatDots() {
  const c = document.getElementById('bts'); c.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'bp' + (i===0 ? ' b1' : '');
    d.id = 'bp' + i; c.appendChild(d);
  }
}

function updateBeatDots(b, isPrep) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('bp' + i);
    if (d) d.className = 'bp' + (i===0?' b1':'') + (i===b%4?' on':'');
  }
}

function renderPassPips() {
  const c = document.getElementById('ppips'); c.innerHTML = '';
  for (let i = 0; i < totalPass; i++) {
    const d = document.createElement('div');
    d.className = 'ppip' + (i<pass?' done':i===pass?' active':'');
    c.appendChild(d);
  }
}

function buildChips() {
  const c = document.getElementById('chips'); c.innerHTML = '';
  EXERS.forEach((ex, i) => {
    const b = document.createElement('button');
    b.className = 'chip' + (i===curExIdx?' sel':'');
    b.textContent = ex.name;
    b.onclick = () => {
      if (running) stopSession();
      curExIdx = i;
      phrase = EXERS[i].make(curKey);
      document.querySelectorAll('.chip').forEach((el,j) => el.classList.toggle('sel',j===i));
      buildNotation();
    };
    c.appendChild(b);
  });
}

function buildPhrase() {
  phrase = EXERS[curExIdx].make(curKey);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('grantBtn').onclick = async () => {
  const ok = await initMic();
  if (ok) {
    document.getElementById('ov').classList.add('gone');
    setStatus('Press Start to begin', 'idle');
  } else {
    const e = document.getElementById('ovErr');
    e.style.display = 'block';
    e.textContent = 'Microphone access denied. Check browser permissions and reload.';
  }
};

document.getElementById('startBtn').onclick = startSession;
document.getElementById('stopBtn').onclick  = () => { stopSession(); setStatus('Stopped', 'idle'); };
document.getElementById('newBtn').onclick   = () => {
  if (running) stopSession();
  buildPhrase();
  buildNotation();
  setStatus('New phrase ready', 'idle');
};

document.getElementById('bpmR').oninput = function() {
  bpm = +this.value;
  document.getElementById('bpmV').textContent = bpm;
  beatSec = 60 / bpm;
};
document.getElementById('keyS').onchange = function() {
  curKey = this.value;
  if (running) stopSession();
  buildPhrase(); buildNotation();
};
document.getElementById('passS').onchange = function() {
  totalPass = +this.value;
  if (running) stopSession();
  renderPassPips();
};

window.addEventListener('resize', () => { buildNotation(); });

// Boot
buildBeatDots();
buildChips();
buildPhrase();

// VexFlow loads synchronously from CDN, so we can render immediately
window.addEventListener('load', () => {
  buildNotation();
});
</script>
</body>
