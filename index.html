<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SightSing</title>
<script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
<link rel="stylesheet" href="css/main.css">
</head>
<body data-state="READY">

<div class="version-badge" id="versionBadge">v0.3</div>

<!-- Mic permission overlay -->
<div class="ov" id="ov">
  <div class="ov-card">
    <h1 class="ov-logo">Sight<em>Sing</em></h1>
    <p class="ov-tagline">Interval sight-singing with real-time pitch feedback.</p>
    <button class="ov-start" id="grantBtn">Start — allow microphone</button>
    <button class="ov-how-btn" id="howBtn">How does it work ↓</button>
    <ol class="ov-steps" id="ovSteps" style="display:none">
      <li>Choose an interval from the grid below</li>
      <li>Press <strong>Tonic</strong> to hear the root note (optional)</li>
      <li>Press <strong>Sing!</strong> — 4 clicks, then sing</li>
      <li>Measure 1: sing the tonic &nbsp;·&nbsp; Measure 2: sing the interval</li>
    </ol>
    <p class="ov-err" id="ovErr" style="display:none"></p>
  </div>
</div>

<!-- Header -->
<header class="hdr">
  <span class="logo">Sight<em>Sing</em></span>
  <button class="gear-btn" id="gearBtn" aria-label="Settings" title="Settings">⚙</button>
</header>

<!-- Settings drawer -->
<div class="settings-drawer" id="settingsDrawer" aria-hidden="true">
  <div class="settings-inner">
    <div class="setting-row">
      <label class="setting-lbl" for="keyS">Key</label>
      <select id="keyS">
        <option value="C">C</option>
        <option value="G">G</option>
        <option value="F">F</option>
        <option value="D">D</option>
        <option value="Bb">B♭</option>
        <option value="A">A</option>
      </select>
    </div>
    <div class="setting-row">
      <label class="setting-lbl" for="clefS">Clef</label>
      <select id="clefS">
        <option value="G">Treble</option>
        <option value="G8vb">Tenor</option>
        <option value="F">Bass</option>
      </select>
    </div>
    <div class="setting-row">
      <label class="setting-lbl" for="bpmR">♩ =</label>
      <input type="range" id="bpmR" min="40" max="100" value="66">
      <span class="bpm-num" id="bpmV">66</span>
    </div>
  </div>
</div>

<!-- Main content -->
<main class="main">

  <!-- Staff — hero element -->
  <div class="staff-wrap">
    <div class="staff-card">
      <canvas id="mainCanvas" height="240"></canvas>
    </div>
    <div class="beat-row" id="beatRow">
      <span class="beat-dot" id="bd0"></span>
      <span class="beat-dot" id="bd1"></span>
      <span class="beat-dot" id="bd2"></span>
      <span class="beat-dot" id="bd3"></span>
    </div>
  </div>

  <!-- Live pitch readout -->
  <div class="readout">
    <span class="readout-note" id="readoutNote">—</span>
    <span class="readout-cents" id="readoutCents"></span>
  </div>

  <!-- Status line -->
  <p class="status-msg" id="statusMsg"></p>

  <!-- Interval grid -->
  <div class="iv-grid" id="intervalGrid"></div>

  <!-- READY / REVIEW state actions -->
  <div class="actions" id="actionsWrap">
    <button class="btn-tonic" id="btnTonic">Tonic</button>
    <button class="btn-sing"  id="btnSing">Sing!</button>
  </div>

  <!-- METRO / SINGING state -->
  <button class="btn-stop hidden" id="stopBtn">■ Stop</button>

</main>

<!--
  Script load order (no bundler — order = dependency graph):
    theory.js    → defines beatSec, NOTE_NAMES, CLEF_DEFS, INTERVALS, helpers
    audio.js     → initMic, metroClick, playTonic, pianoTone
    yin.js       → detectFundamental, pitchState, processPitchFrame, getLatestPitch
    scheduler.js → startScheduler, stopScheduler, beatAudioTimes, vBeatQueue
    notation.js  → canvas, ctx2d, drillGeo, noteBmp, rebuildNotation, initNotation
    draw.js      → drawFrame, midiToY, pitchTimeToX
    state.js     → app state machine, UI wiring, boot
-->
<script src="js/theory.js"></script>
<script src="js/audio.js"></script>
<script src="js/yin.js"></script>
<script src="js/scheduler.js"></script>
<script src="js/notation.js"></script>
<script src="js/draw.js"></script>
<script src="js/state.js"></script>

</body>
</html>
